
services:
  postgres:
    image: postgres:15
    container_name: dv_postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: gdelt
      POSTGRES_USER: gdelt_user
      POSTGRES_PASSWORD: gdelt_pass
    volumes:
      - ./data/silver:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  airflow:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      - POSTGRES_DB=gdelt
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=gdelt_user
      - POSTGRES_PASSWORD=gdelt_pass
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:3b
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__DAGS_FOLDER=/workspace/airflow/dags
      - AIRFLOW__CORE__PARALLELISM=4
      - AIRFLOW__CORE__DAG_CONCURRENCY=4
      - AIRFLOW__WEBSERVER__WORKERS=2
      - AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT=120
      - AIRFLOW__LOGGING__LOGGING_LEVEL=INFO
      - AIRFLOW__SCHEDULER__MAX_DAGRUNS_TO_CREATE_PER_LOOP=5
      - AIRFLOW__SCHEDULER__MAX_TIS_PER_QUERY=32
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://gdelt_user:gdelt_pass@postgres:5432/airflow_meta
    volumes:
      - ./:/workspace
    ports:
      - "8080:8080"
  # Startup handled by Dockerfile CMD (webserver + scheduler)
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ./data/ollama:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    environment:
      - MB_DB_TYPE=postgres
      - MB_DB_DBNAME=metabase
      - MB_DB_PORT=5432
      - MB_DB_USER=gdelt_user
      - MB_DB_PASS=gdelt_pass
      - MB_DB_HOST=postgres
    restart: unless-stopped